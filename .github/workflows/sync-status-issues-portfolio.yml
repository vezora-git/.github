name: Sincronizar Status com o Portfolio

on:
  project_card:
    types: [moved] # Dispara de forma estável quando o card é arrastado de coluna

jobs:
  sync-status:
    runs-on: ubuntu-latest
    
    steps:
      - name: Sincronizar com o Projeto Central
        env:
          GH_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN }}
          ORGANIZATION: "strato-git"
          PORTFOLIO_NUMBER: 5 
        
        run: |
          # 1. O evento project_card nos dá o ID da coluna antiga/nova. Vamos descobrir o nome textual dela.
          COL_ID="${{ github.event.project_card.column_id }}"
          STATUS_TEXT=$(gh api projects/columns/$COL_ID --jq '.name')
          
          echo "O novo status detectado é: $STATUS_TEXT"
          
          # 2. Captura a URL da Issue/PR vinculada ao card e extrai o Node ID global
          CONTENT_URL="${{ github.event.project_card.content_url }}"
          if [ -z "$CONTENT_URL" ] || [ "$CONTENT_URL" = "null" ]; then
            echo "O card movido não está vinculado a uma Issue ou PR."
            exit 0
          fi
          
          CONTENT_NODE_ID=$(gh api $CONTENT_URL --jq '.node_id')
          echo "Sincronizando item global ($CONTENT_NODE_ID) com o projeto Portfolio ($PORTFOLIO_NUMBER)..."

          # 3. Executa a query GraphQL para buscar a estrutura do Portfolio
          gh api graphql -f query='
            query($org: String!, $project_num: Int!) {
              organization(login: $org) {
                projectV2(number: $project_num) {
                  id
                  field(name: "Status") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options {
                        id
                        name
                      }
                    }
                  }
                  items(first: 100) {
                    nodes {
                      id
                      content {
                        ... on Issue { id }
                        ... on PullRequest { id }
                      }
                    }
                  }
                }
              }
            }' -f org="$ORGANIZATION" -g project_num=$PORTFOLIO_NUMBER > projeto_info.json

          # 4. Extração dos IDs internos usando o nome da coluna coletado no passo 1
          PROJECT_ID=$(jq -r '.data.organization.projectV2.id' projeto_info.json)
          FIELD_ID=$(jq -r '.data.organization.projectV2.field.id' projeto_info.json)
          OPTION_ID=$(jq -r --arg status "$STATUS_TEXT" '.data.organization.projectV2.field.options[] | select(.name==$status) | .id' projeto_info.json)
          ITEM_ID=$(jq -r --arg content "$CONTENT_NODE_ID" '.data.organization.projectV2.items.nodes[] | select(.content.id==$content) | .id' projeto_info.json)

          # 5. Se o item existir no Portfolio, atualiza a coluna dele
          if [ "$ITEM_ID" != "null" ] && [ "$OPTION_ID" != "null" ]; then
            echo "Item encontrado no Portfolio. Atualizando coluna..."
            gh api graphql -f query='
              mutation($project: ID!, $item: ID!, $field: ID!, $option: ID!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project,
                  itemId: $item,
                  fieldId: $field,
                  value: { singleSelectOptionId: $option }
                }) {
                  projectV2Item { id }
                }
              }' -f project="$PROJECT_ID" -f item="$ITEM_ID" -f field="$FIELD_ID" -f option="$OPTION_ID"
            echo "Sincronização concluída com sucesso!"
          else
            echo "Aviso: O item não foi encontrado no projeto Portfolio ou a coluna '$STATUS_TEXT' não existe lá."
          fi